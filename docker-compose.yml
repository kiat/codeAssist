services:
    # frontend:
    #     build:
    #         context: ./frontend/
    #         target: prod
    #     ports:
    #         - "3000:3000"
    #     volumes:
    #         - ./frontend:/app
    #         - /app/node_modules
    #     stdin_open: true
    #     command: npm start
    # frontend-test:
    #     build:
    #         context: ./frontend/
    #         target: test
    #     volumes:
    #         - /app/node_modules
    #     environment:
    #         - CI=true
    #     command: npm run test
    backend:
        container_name: flask_container
        build: 
            context: "./backend/"
            dockerfile: Dockerfile
        environment:
            # FLASK_APP: app.py
            # FLASK_DEBUG: 1
            PYTHONUNBUFFERED: 1
        ports:
            - "5001:5001"
        extra_hosts:
              - "host.docker.internal:host-gateway"
        networks:
            - shared_net
        volumes:
            - ./backend/:/usr/src/app
            - /var/run/docker.sock:/var/run/docker.sock
        restart: unless-stopped

    db:
        container_name: postgres_container
        image: postgres:15.3-alpine3.18
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${PG_DB}
            POSTGRES_INITDB_ARGS: "-c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf"
        networks:
            - shared_net
        volumes: 
            - db:/var/lib/postgresql/data
            - ./postgres_security/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
            - ./postgres_security/postgresql.conf:/etc/postgresql/postgresql.conf:ro

    pgadmin:
      container_name: pgadmin4_container
      image: dpage/pgadmin4:7.5
      restart: always
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@admin.com
        PGADMIN_DEFAULT_PASSWORD: 12345
      networks: 
        - shared_net 
      ports:
        - "127.0.0.1:5050:80"
      volumes:
        - pgadmin:/var/lib/pgadmin


networks:
  shared_net:
    driver: bridge

volumes:
  db:
    driver: local
    name: postgres_volume
  pgadmin:
    driver: local
    name: pgadmin_volume
